name: gdrive-indexr

services:
  backend:
    build:
      context: .
      target: backend
    container_name: gdrive-indexr-backend
    env_file:
      - .env                     # FOLDER_ID, ADMIN_PASSWORD
    volumes:
      - ./data:/app/data         # database.sqlite + service-account.json
    restart: always

  nginx:
    build:
      context: .
      target: frontend
    container_name: gdrive-indexr-nginx
#    environment:
#      - NGINX_DOMAIN=your-domain.com   # SSL 활성화 시 주석 해제
    ports:
      - "80:80"
#      - "443:443"                      # SSL 활성화 시 주석 해제
#    volumes:
#      - ./certs:/etc/nginx/certs:ro    # SSL 인증서 디렉토리 (Let's Encrypt 등)
    depends_on:
      - backend
    restart: always
