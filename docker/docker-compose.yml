name: gdrive-indexr

services:
  backend:
    build: .
    container_name: gdrive-indexr-backend
    env_file:
      - .env                     # FOLDER_ID, ADMIN_PASSWORD
    volumes:
      - ./data:/app/data         # SQLite DB (database.sqlite) + 서비스 계정 키 (service-account.json)
    restart: always

  nginx:
    image: nginx:latest
    container_name: gdrive-indexr-nginx
    ports:
      - "80:80"
      # - "443:443"              # SSL 활성화 시 주석 해제
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      # - ./certs:/etc/nginx/certs:ro   # SSL 인증서 디렉토리 (Let's Encrypt 등)
    depends_on:
      - backend
    restart: always
